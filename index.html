<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Candle Blow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prefixfree/1.0.7/prefixfree.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
  </head>
  <body>
    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>
    
    <div class="blow-display">
      Blow the cake
    </div>
    
    <!-- Celebration overlay with fade-in image -->
    <div class="celebration-overlay" id="celebrationOverlay">
      <img src="bgbgpic.png" alt="Happy Birthday" id="celebrationImage" />
    </div>
    
    <!-- Happy Birthday Audio -->
    <audio id="birthdayAudio" preload="auto">
      <source src="hbd.mp3" type="audio/mpeg">
    </audio>
    
    <!-- Music Toggle Button -->
    <button id="musicToggleBtn" class="music-toggle-button" style="display:none;">🔊 Music: ON</button>
    
    
    
    <!-- Restart Button -->
    <button id="restartBtn" class="restart-button" style="display:none;">Restart</button>
    
    <div class="cake">
      <div class="plate"></div>
      <div class="layer layer-bottom"></div>
      <div class="layer layer-middle"></div>
      <div class="layer layer-top"></div>
      <div class="icing"></div>
      <div class="drip drip1"></div>
      <div class="drip drip2"></div>
      <div class="drip drip3"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
